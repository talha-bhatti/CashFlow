<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#060d09">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CashFlow">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>CashFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #060d09;
      --glass: rgba(14, 28, 20, 0.55);
      --glass-strong: rgba(14, 28, 20, 0.75);
      --glass-border: rgba(52, 211, 153, 0.10);
      --glass-border-hover: rgba(52, 211, 153, 0.22);
      --accent: #34d399;
      --accent-soft: #6ee7b7;
      --accent-dim: rgba(52, 211, 153, 0.12);
      --accent-glow: rgba(52, 211, 153, 0.08);
      --red: #fb7185;
      --red-dim: rgba(251, 113, 133, 0.10);
      --text: #e2ece6;
      --text-sub: rgba(226, 236, 230, 0.55);
      --text-muted: rgba(226, 236, 230, 0.28);
      --font: 'Outfit', -apple-system, system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', monospace;
      --r: 20px;
      --r-sm: 14px;
      --blur: 28px;
      --orb1: rgba(52,211,153,0.15);
      --orb2: rgba(52,211,153,0.08);
    }

    /* ── Light mode ── */
    body.light {
      --bg: #f0f7f3;
      --glass: rgba(255, 255, 255, 0.60);
      --glass-strong: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(52, 211, 153, 0.18);
      --glass-border-hover: rgba(52, 211, 153, 0.35);
      --accent: #059669;
      --accent-soft: #10b981;
      --accent-dim: rgba(5, 150, 105, 0.10);
      --accent-glow: rgba(5, 150, 105, 0.12);
      --red: #e11d48;
      --red-dim: rgba(225, 29, 72, 0.08);
      --text: #0f2d1e;
      --text-sub: rgba(15, 45, 30, 0.55);
      --text-muted: rgba(15, 45, 30, 0.32);
      --orb1: rgba(52,211,153,0.25);
      --orb2: rgba(16,185,129,0.12);
    }
    body.light::after { opacity: 0.15; }
    body.light .ambient .orb-1 { background: radial-gradient(circle, var(--orb1) 0%, transparent 70%); }
    body.light .ambient .orb-2 { background: radial-gradient(circle, var(--orb2) 0%, transparent 70%); }
    body.light .bnav { background: rgba(240,247,243,0.90); border-top-color: rgba(52,211,153,0.15); }
    body.light .hero { background: linear-gradient(145deg, rgba(255,255,255,0.8), rgba(255,255,255,0.5)); }

    html, body { transition: background 0.4s ease, color 0.4s ease; }

    html { height: 100%; }
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient orbs */
    .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .ambient .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4; }
    .ambient .orb-1 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(52,211,153,0.15) 0%, transparent 70%);
      top: -80px; left: -60px; animation: f1 18s ease-in-out infinite;
    }
    .ambient .orb-2 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(52,211,153,0.08) 0%, transparent 70%);
      bottom: 10%; right: -80px; animation: f2 22s ease-in-out infinite;
    }
    .ambient .orb-3 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(110,231,183,0.06) 0%, transparent 70%);
      top: 50%; left: 40%; animation: f3 15s ease-in-out infinite;
    }
    @keyframes f1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,40px)} }
    @keyframes f2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-30px)} }
    @keyframes f3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-35px)} }

    /* Noise overlay */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.6;
    }

    #app {
      position: relative; z-index: 1;
      max-width: 460px; margin: 0 auto;
      padding: 24px 18px calc(40px + env(safe-area-inset-bottom, 16px));
      min-height: 100vh;
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-border); border-radius: var(--r);
      transition: border-color 0.25s;
    }
    .glass:hover { border-color: var(--glass-border-hover); }

    /* Top bar */
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .logo { font-family: var(--mono); font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .logo .c { color: var(--accent); text-shadow: 0 0 40px rgba(52,211,153,0.3); }
    .logo .f { color: var(--text); opacity: 0.35; font-weight: 400; }
    .ta { display: flex; gap: 8px; }
    .ib {
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 12px;
      color: var(--text-sub); font-size: 16px; cursor: pointer; transition: all 0.25s;
    }
    .ib:active, .ib.on { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 24px var(--accent-glow); }
    .ib svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* Hero balance */
    .hero {
      padding: 32px 24px 28px; margin-bottom: 16px; text-align: center;
      position: relative; overflow: hidden;
      background: linear-gradient(145deg, rgba(14,28,20,0.7), rgba(14,28,20,0.5));
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(52,211,153,0.1), transparent 65%);
      pointer-events: none;
    }
    .hero .hl { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 8px; position: relative; }
    .hero .hv { font-family: var(--mono); font-size: 34px; font-weight: 700; position: relative; letter-spacing: -1px; }
    .hero .hv.pos { color: var(--accent); text-shadow: 0 0 50px rgba(52,211,153,0.15); }
    .hero .hv.neg { color: var(--red); text-shadow: 0 0 50px rgba(251,113,133,0.15); }

    /* Stats */
    .sr { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .sp { padding: 16px 18px; display: flex; flex-direction: column; gap: 4px; }
    .sp .sl { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }
    .sp .sv { font-family: var(--mono); font-size: 17px; font-weight: 700; }
    .sv.g { color: var(--accent-soft); }
    .sv.r { color: var(--red); }

    /* Add buttons */
    .ar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
    .ab {
      padding: 15px 12px; border-radius: var(--r); border: 1px solid;
      font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;
    }
    .ab.i { background: rgba(52,211,153,0.06); border-color: rgba(52,211,153,0.18); color: var(--accent); }
    .ab.i:active { background: rgba(52,211,153,0.14); box-shadow: 0 0 30px rgba(52,211,153,0.1); }
    .ab.e { background: rgba(251,113,133,0.05); border-color: rgba(251,113,133,0.15); color: var(--red); }
    .ab.e:active { background: rgba(251,113,133,0.12); box-shadow: 0 0 30px rgba(251,113,133,0.08); }

    /* Search */
    .sw2 { margin-bottom: 20px; overflow: hidden; max-height: 0; opacity: 0; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); }
    .sw2.on { max-height: 70px; opacity: 1; }
    .sb2 { position: relative; }
    .sb2 svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text-muted); fill: none; stroke-width: 2; pointer-events: none; }
    .sinp {
      width: 100%; padding: 14px 18px 14px 44px;
      background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: var(--r);
      color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .sinp:focus { border-color: rgba(52,211,153,0.3); }
    .sinp::placeholder { color: var(--text-muted); }

    /* Transactions */
    .dl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; color: var(--text-muted); margin-bottom: 12px; padding-left: 4px; }
    .dg { margin-bottom: 22px; }
    .tc { padding: 16px 18px; margin-bottom: 8px; }
    .tt { display: flex; justify-content: space-between; align-items: flex-start; }
    .tl { display: flex; gap: 14px; align-items: center; flex: 1; min-width: 0; }
    .ti2 { width: 40px; height: 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 18px; }
    .ti2.ig { background: rgba(52,211,153,0.1); }
    .ti2.ir { background: rgba(251,113,133,0.08); }
    .tif { min-width: 0; }
    .tit { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tm { display: flex; gap: 8px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
    .tb { font-size: 10px; padding: 3px 10px; background: rgba(52,211,153,0.06); border-radius: 8px; color: var(--text-sub); font-weight: 500; }
    .ttime { font-size: 10px; color: var(--text-muted); }
    .tr2 { text-align: right; flex-shrink: 0; margin-left: 14px; }
    .tam { font-family: var(--mono); font-size: 14px; font-weight: 700; }
    .tam.g { color: var(--accent-soft); }
    .tam.r { color: var(--red); }
    .td {
      background: none; border: none; color: var(--text-muted); font-size: 10px;
      cursor: pointer; padding: 4px 8px; margin-top: 4px; border-radius: 6px;
      transition: color 0.15s; font-family: var(--font);
    }
    @media (hover: none) { .td { opacity: 0.5; } }
    @media (hover: hover) { .td { opacity: 0; } .tc:hover .td { opacity: 1; } }
    .td:active { color: var(--red); }
    .tde { font-size: 12px; color: var(--text-muted); margin-top: 10px; padding-left: 54px; line-height: 1.6; }
    .es { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
    .ei { font-size: 44px; margin-bottom: 14px; opacity: 0.25; }

    /* Form */
    .fh { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
    .bb {
      background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: var(--r-sm);
      color: var(--text-sub); font-family: var(--font); font-size: 13px;
      padding: 9px 16px; cursor: pointer; transition: all 0.2s;
    }
    .bb:active { border-color: var(--accent); color: var(--accent); }
    .ftit { font-size: 20px; font-weight: 700; }
    .ftit.g { color: var(--accent); }
    .ftit.r { color: var(--red); }
    .fg { margin-bottom: 18px; }
    .fl { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8px; }
    .fi {
      width: 100%; padding: 14px 16px;
      background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: var(--r-sm);
      color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .fi:focus { border-color: rgba(52,211,153,0.35); }
    .fi::placeholder { color: var(--text-muted); }
    textarea.fi { min-height: 72px; resize: vertical; line-height: 1.6; }
    .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .nl { background: none; border: none; color: var(--accent); font-family: var(--font); font-size: 11px; cursor: pointer; padding: 5px 0; opacity: 0.6; text-decoration: underline; text-underline-offset: 3px; }
    .nl:active { opacity: 1; }

    /* Categories */
    .cg { display: flex; flex-wrap: wrap; gap: 8px; }
    .cb {
      padding: 10px 16px; background: var(--glass); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border); border-radius: var(--r-sm);
      color: var(--text-sub); font-family: var(--font); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 7px;
    }
    .cb.on { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); box-shadow: 0 0 24px rgba(52,211,153,0.08); }

    /* Suggestions */
    .sw { position: relative; }
    .sd {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--glass-strong); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: var(--r-sm);
      overflow: hidden; z-index: 50; box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .si {
      display: flex; align-items: center; gap: 10px; width: 100%; background: none; border: none;
      border-bottom: 1px solid rgba(52,211,153,0.05); color: var(--text); font-family: var(--font);
      font-size: 13px; padding: 13px 18px; cursor: pointer; text-align: left; transition: background 0.15s;
    }
    .si:active { background: rgba(52,211,153,0.06); }
    .si:last-child { border-bottom: none; }
    .sc { font-family: var(--mono); font-size: 10px; color: var(--accent); opacity: 0.5; }

    /* Submit */
    .sub {
      width: 100%; padding: 18px; border: none; border-radius: var(--r);
      font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer;
      margin-top: 10px; letter-spacing: 0.3px; transition: all 0.25s; position: relative; overflow: hidden;
    }
    .sub.g { background: linear-gradient(135deg, var(--accent), #2ec985); color: var(--bg); box-shadow: 0 8px 40px rgba(52,211,153,0.2); }
    .sub.g:active { box-shadow: 0 4px 50px rgba(52,211,153,0.35); transform: scale(0.985); }
    .sub.r { background: linear-gradient(135deg, var(--red), #e5566a); color: var(--bg); box-shadow: 0 8px 40px rgba(251,113,133,0.15); }
    .sub.r:active { box-shadow: 0 4px 50px rgba(251,113,133,0.3); transform: scale(0.985); }

    /* Settings */
    .ss { margin-bottom: 26px; }
    .ssl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 12px; }
    .ssc { padding: 18px 20px; margin-bottom: 10px; }
    .ssc p { font-size: 12px; color: var(--text-sub); margin-bottom: 14px; line-height: 1.7; }
    .sbs { display: flex; gap: 8px; flex-wrap: wrap; }
    .sbb {
      padding: 11px 18px; border-radius: var(--r-sm); font-family: var(--font);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .sbb.p { background: var(--accent-dim); border: 1px solid rgba(52,211,153,0.2); color: var(--accent); }
    .sbb.p:active { background: rgba(52,211,153,0.2); }
    .sbb.d { background: var(--red-dim); border: 1px solid rgba(251,113,133,0.18); color: var(--red); }
    .sbb.d:active { background: rgba(251,113,133,0.18); }
    .sbb.s { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-sub); }
    .sbb.s:active { border-color: var(--glass-border-hover); color: var(--text); }
    .ds { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid rgba(52,211,153,0.05); font-size: 13px; }
    .ds:last-child { border-bottom: none; }
    .dsl { color: var(--text-sub); }
    .dsv { font-family: var(--mono); font-size: 12px; color: var(--accent); opacity: 0.7; }

    /* Toast */
    .toast {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%) translateY(20px);
      padding: 14px 28px; background: var(--glass-strong);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: var(--r);
      color: var(--text); font-family: var(--font); font-size: 13px; font-weight: 500;
      z-index: 200; box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      opacity: 0; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); pointer-events: none;
    }
    .toast.v { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok { border-color: rgba(52,211,153,0.3); }
    .toast.err { border-color: rgba(251,113,133,0.3); }

    /* Modal */
    .mo {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 150; padding: 24px; animation: fi 0.2s ease;
    }
    @keyframes fi { from{opacity:0} to{opacity:1} }
    .mb {
      background: var(--glass-strong); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: var(--r);
      padding: 28px 24px; max-width: 340px; width: 100%; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .mb h3 { font-size: 16px; font-weight: 700; color: var(--red); margin-bottom: 10px; }
    .mb p { font-size: 13px; color: var(--text-sub); line-height: 1.7; margin-bottom: 22px; }
    .ma { display: flex; gap: 10px; justify-content: flex-end; }

    /* Install */
    .inb {
      position: fixed; bottom: 24px; left: 18px; right: 18px;
      max-width: 460px; margin: 0 auto; padding: 16px 20px;
      background: var(--glass-strong); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: var(--r);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      z-index: 100; box-shadow: 0 16px 50px rgba(0,0,0,0.4); animation: su 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes su { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
    .inb p { font-size: 13px; color: var(--text-sub); }
    .inb strong { color: var(--accent); }
    .inb-i { padding: 10px 22px; background: var(--accent); color: var(--bg); border: none; border-radius: var(--r-sm); font-family: var(--font); font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .inb-d { background: none; border: none; color: var(--text-muted); padding: 8px; font-size: 16px; cursor: pointer; }

    /* ── PIN Lock Screen ── */
    .pin-screen {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg); padding: 40px 24px;
      animation: fu 0.3s ease;
    }
    .pin-logo { font-family: var(--mono); font-size: 22px; font-weight: 700; margin-bottom: 48px; }
    .pin-logo .c { color: var(--accent); }
    .pin-logo .f { color: var(--text); opacity: 0.3; font-weight: 400; }
    .pin-title { font-size: 16px; font-weight: 600; margin-bottom: 32px; color: var(--text-sub); }
    .pin-dots { display: flex; gap: 16px; margin-bottom: 48px; }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--glass-border);
      background: transparent; transition: all 0.2s;
    }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
    .pin-dot.shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 80%{transform:translateX(-4px)} }
    .pin-dot.error { background: var(--red); border-color: var(--red); }
    .pin-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; width: 100%; max-width: 300px;
    }
    .pin-key {
      height: 72px; border-radius: var(--r);
      background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      color: var(--text); font-family: var(--font); font-size: 22px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }

    /* ── Toggle switch ── */

    /* ── History ── */

    /* Category breakdown inside month */

    .month-divider { height: 1px; background: rgba(52,211,153,0.06); margin: 8px 0; }

    /* Tx mini list inside month */
    .mtx { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(52,211,153,0.04); }

    .month-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 14px 0 6px; }
    .ms-pill { text-align: center; padding: 10px 8px; border-radius: 12px; background: rgba(52,211,153,0.04); border: 1px solid rgba(52,211,153,0.07); }
    .ms-pill .ms-l { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 4px; }

    /* ── Categories manager ── */

    /* ── Emoji picker modal ── */
    .emoji-modal {

    @keyframes slideUp2 { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .emoji-sheet h4 { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; }
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
    .emoji-opt {
      height: 44px; border-radius: 10px; font-size: 22px;

      transition: all 0.15s;
    }
    .emoji-opt:active { background: var(--accent-dim); border-color: var(--accent); transform: scale(0.9); }

    /* ── Data safety banner ── */
    .dsafe-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 400;

    body.light .dsafe-banner {
      background: rgba(240, 247, 243, 0.97);
      border-bottom-color: rgba(5, 150, 105, 0.2);
    }
    @keyframes slideDown { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    .dsafe-inner { max-width: 460px; margin: 0 auto; }
    .dsafe-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
    .dsafe-icon { font-size: 26px; flex-shrink: 0; margin-top: 2px; }

    .dsafe-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .dsafe-ok {
      flex: 1; padding: 12px 16px; background: var(--accent); color: #060d09;
      border: none; border-radius: var(--r-sm); font-family: var(--font);
      font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .dsafe-ok:active { opacity: 0.85; }
    .dsafe-export {
      padding: 12px 16px; background: var(--glass);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: var(--r-sm);
      color: var(--text-sub); font-family: var(--font);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .dsafe-export:active { border-color: var(--accent); color: var(--accent); }

    /* ── Bottom nav ── */
    .bnav {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 460px; margin: 0 auto;
      display: flex; background: rgba(6,13,9,0.88);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--glass-border);
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom, 0px));

    }
    .bn-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-family: var(--font); font-size: 10px; font-weight: 500;
      padding: 4px 0; transition: color 0.2s; letter-spacing: 0.3px;

    .bn-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .bn-item.active { color: var(--accent); }
    .bn-item.active svg { filter: drop-shadow(0 0 6px rgba(52,211,153,0.4)); }

    /* Anim */
    @keyframes fu { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fu { animation: fu 0.45s cubic-bezier(0.25,0.46,0.45,0.94) both; }

    ::-webkit-scrollbar { width: 3px; }

</head>
<body>
  <div class="ambient"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div id="app"></div>
  <nav class="bnav" id="bnav" style="display:none">
    <button class="bn-item" id="bn-home" onclick="gH()">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <button class="bn-item" id="bn-hist" onclick="oHist()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </button>
    <button class="bn-item" id="bn-set" onclick="oSet()">
      <svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      Settings
    </button>
  </nav>

  <script>
    const SK='cashflow_data';
    function ld(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return{transactions:[],customCategories:[]};}
    function sv(d){localStorage.setItem(SK,JSON.stringify(d));}
    function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,9);}

    let S={...ld(),view:'home',txType:'expense',so:false,sq:'',
      form:{title:'',amount:'',category:'',customCat:'',description:'',date:'',time:''},
      tso:false,cso:false,openMonths:{},editingId:null};

    // Default categories as objects with emoji
    const DC_OBJ=[
      {name:'Food & Dining',emoji:'🍽'},
      {name:'Transport',emoji:'🚗'},
      {name:'Bills & Utilities',emoji:'📄'},
      {name:'Shopping',emoji:'🛍'}
    ];
    // Legacy flat array kept for backward compat — always derive from DC_OBJ
    const DC=DC_OBJ.map(c=>c.name);
    // Convert old flat customCategories strings to objects on load
    if(S.customCategories.length && typeof S.customCategories[0]==='string'){
      S.customCategories=S.customCategories.map(n=>({name:n,emoji:'📌'}));
    }
    // All categories combined as objects
    function allCats(){return[...DC_OBJ,...S.customCategories];}
    // Get emoji for a category name
    function catEmoji(name,type){
      if(type==='income') return '💰';
      const found=allCats().find(c=>c.name===name);
      return found?found.emoji:'📌';
    }
    function fc(n){return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n);}
    function fd(d){return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});}
    function ft(d){return new Date(d).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
    function sg(f,q){if(!q||q.length<1)return[];const lo=q.toLowerCase(),fr={};S.transactions.forEach(t=>{const v=f==='title'?t.title:t.category;if(v&&v.toLowerCase().includes(lo))fr[v]=(fr[v]||0)+1;});return Object.entries(fr).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([v,c])=>({v,c}));}
    function nw(){const d=new Date(),p=n=>String(n).padStart(2,'0');return{date:`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`,time:`${p(d.getHours())}:${p(d.getMinutes())}`};}
    function es(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    function svAll(){sv({transactions:S.transactions,customCategories:S.customCategories});}

    const searchSvg=`<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>`;
    const gearSvg=`<svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`;

    const bnav=document.getElementById('bnav');
    function setNav(v){
      bnav.style.display='flex';
      document.getElementById('bn-home').classList.toggle('active',v==='home');
      document.getElementById('bn-hist').classList.toggle('active',v==='history');
      document.getElementById('bn-set').classList.toggle('active',v==='settings');
    }
    function render(){
      if(S.view==='add'||S.view==='edit'){bnav.style.display='none';renderAdd();}
      else if(S.view==='history'){setNav('history');renderHist();}
      else if(S.view==='settings'){setNav('settings');renderSet();}
      else if(S.view==='categories'){bnav.style.display='none';renderCats();}
      else{setNav('home');renderHome();}
    }

    const app=document.getElementById('app');

    // ── HISTORY ──
    function renderHist(){
      const txs=S.transactions;
      if(!txs.length){
        app.innerHTML=`<div class="top-bar fu"><div class="logo"><span class="c">Cash</span><span class="f">Flow</span></div></div><div class="es"><div class="ei">📅</div>No transactions yet.</div>`;
        return;
      }
      // Group by YYYY-MM
      const byMonth={};
      txs.forEach(t=>{
        const d=new Date(t.date),k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if(!byMonth[k])byMonth[k]=[];
        byMonth[k].push(t);
      });
      const monthKeys=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));

      // Max expense for bar scaling
      const monthExpenses=monthKeys.map(k=>byMonth[k].filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0));
      const maxExp=Math.max(...monthExpenses,1);

      const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

      // Group by year
      const byYear={};
      monthKeys.forEach(k=>{const y=k.slice(0,4);if(!byYear[y])byYear[y]=[];byYear[y].push(k);});

      let html='<div class="top-bar fu"><div class="logo"><span class="c">Cash</span><span class="f">Flow</span></div></div>';
      html+='<div class="fu d1">';

      Object.keys(byYear).sort((a,b)=>b-a).forEach(year=>{
        html+=`<div class="hist-year">${year}</div>`;
        byYear[year].forEach(mk=>{
          const [y,mo]=mk.split('-');
          const mName=MONTH_NAMES[+mo-1];
          const mTxs=byMonth[mk].sort((a,b)=>new Date(b.date)-new Date(a.date));
          const mInc=mTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
          const mExp=mTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
          const mBal=mInc-mExp;
          const barPct=Math.round((mExp/maxExp)*100);
          const isOpen=!!S.openMonths[mk];

          // Category breakdown
          const catTotals={};
          mTxs.filter(t=>t.type==='expense').forEach(t=>{catTotals[t.category]=(catTotals[t.category]||0)+t.amount;});
          const maxCat=Math.max(...Object.values(catTotals),1);
          const catRows=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
            const pct=Math.round((amt/maxCat)*100);
            const catColor=cat==='Income'?'var(--accent)':'rgba(251,113,133,0.7)';
            return `<div class="mcat-row">
              <div class="mcat-icon">${catEmoji(cat,'expense')}</div>

                <div style="display:flex;justify-content:space-between;align-items:center">

              </div>
              <div class="mcat-amt" style="color:var(--red)">${fc(amt)}</div>
            </div>`;
          }).join('');

          // Transaction list inside month
          const txRows=mTxs.map(t=>{
            const ii=t.type==='income';
            return `<div class="mtx">
              <div class="mtx-icon ${ii?'ig':'ir'}">${catEmoji(t.category,t.type)}</div>
              <div class="mtx-info">
                <div class="mtx-title">${es(t.title)}</div>
                <div class="mtx-meta">${ft(t.date)} · ${es(t.category)}</div>
              </div>
              <div class="mtx-amt ${ii?'g':'r'}">${ii?'+':'−'}${fc(Math.abs(t.amount))}</div>
            </div>`;
          }).join('');

          html+=`<div class="glass month-card ${isOpen?'open':''}" onclick="toggleMonth('${mk}')">
            <div class="month-head">
              <div class="mh-left">
                <div class="mh-name">${mName}</div>
                <div class="mh-count">${mTxs.length} transaction${mTxs.length!==1?'s':''}</div>
              </div>
              <div class="mh-mid">
                <div class="mh-bar-track"><div class="mh-bar-fill" style="width:${isOpen?barPct:0}%"></div></div>
                <div class="mh-bar-sub"><span>${fc(mExp)} spent</span></div>
              </div>
              <div class="mh-right">
                <div class="mh-bal ${mBal>=0?'pos':'neg'}">${mBal>=0?'+':''}${fc(mBal)}</div>
              </div>
              <span class="mh-chevron">▼</span>
            </div>
            <div class="month-body ${isOpen?'open':''}">
              <div class="month-inner">
                <div class="month-stats">
                  <div class="ms-pill"><div class="ms-l">Income</div><div class="ms-v" style="color:var(--accent-soft)">${fc(mInc)}</div></div>
                  <div class="ms-pill"><div class="ms-l">Spent</div><div class="ms-v" style="color:var(--red)">${fc(mExp)}</div></div>
                  <div class="ms-pill"><div class="ms-l">Balance</div><div class="ms-v" style="color:${mBal>=0?'var(--accent-soft)':'var(--red)'}">${fc(mBal)}</div></div>
                </div>
                ${catRows?`<div class="month-divider"></div>${catRows}`:''}
                <div class="month-divider"></div>
                ${txRows}
              </div>
            </div>
          </div>`;
        });
      });
      html+='</div>';
      app.innerHTML=html;
      // Animate bars after render
      requestAnimationFrame(()=>{
        document.querySelectorAll('.mh-bar-fill').forEach((el,i)=>{

        });
      });

    window.subTx=()=>{
      const f=S.form;
      if(!f.title.trim()||!f.amount||isNaN(+f.amount)||+f.amount<=0) return;
      const ii=S.txType==='income';
      const cat=ii?'Income':f.category==='__custom__'?(f.customCat.trim()||'Other'):(f.category||'Other');
      if(!ii&&f.category==='__custom__'&&f.customCat.trim()&&!allCats().some(c=>c.name===f.customCat.trim()))
        S.customCategories.push({name:f.customCat.trim(),emoji:'📌'});
      const ds2=f.date&&f.time?`${f.date}T${f.time}`:f.date?`${f.date}T00:00`:new Date().toISOString();
      const txData={type:S.txType,title:f.title.trim(),amount:+f.amount,category:cat,description:f.description.trim(),date:new Date(ds2).toISOString()};
      if(S.view==='edit'&&S.editingId){
        const idx=S.transactions.findIndex(x=>x.id===S.editingId);
        if(idx>-1) S.transactions[idx]={...S.transactions[idx],...txData};
        toast('Transaction updated ✓');
      } else {
        S.transactions.unshift({id:uid(),...txData});
      }
      svAll(); S.view='home'; S.editingId=null; render();
    };
    window.del=id=>{S.transactions=S.transactions.filter(t=>t.id!==id);svAll();render();};

    // Toast
    function toast(m,t='ok'){const e=document.createElement('div');e.className=`toast ${t}`;e.textContent=m;document.body.appendChild(e);requestAnimationFrame(()=>e.classList.add('v'));setTimeout(()=>{e.classList.remove('v');setTimeout(()=>e.remove(),400);},2800);}

    // Export
    window.exJ=()=>{const d=ld();d.exportedAt=new Date().toISOString();d.appVersion='CashFlow v1';const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`cashflow-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);toast(`Exported ${d.transactions.length} transactions`);};
    window.exC=()=>{const d=ld();if(!d.transactions.length){toast('No data','err');return;}const h2=['Date','Time','Type','Title','Category','Amount (€)','Description'];const rows=d.transactions.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(t=>{const dt=new Date(t.date);return[dt.toISOString().slice(0,10),dt.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),t.type,`"${(t.title||'').replace(/"/g,'""')}"`,`"${(t.category||'').replace(/"/g,'""')}"`,t.type==='income'?t.amount.toFixed(2):(-t.amount).toFixed(2),`"${(t.description||'').replace(/"/g,'""')}"`].join(';');});const csv=[h2.join(';'),...rows].join('\n');const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`cashflow-export-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(u);toast(`Exported ${d.transactions.length} as CSV`);};

    // Import
    let iM='merge';
    window.trI=m=>{iM=m;const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=hImp;i.click();};
    function hImp(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!imp.transactions||!Array.isArray(imp.transactions)){toast('Invalid file','err');return;}
      // Normalize imported customCategories to objects
      const normCats=(arr)=>(arr||[]).map(c=>typeof c==='string'?{name:c,emoji:'📌'}:c);
      if(iM==='replace'){S.transactions=imp.transactions;S.customCategories=normCats(imp.customCategories);}
      else{const ids=new Set(S.transactions.map(t=>t.id));const nw2=imp.transactions.filter(t=>!ids.has(t.id));S.transactions=[...S.transactions,...nw2];normCats(imp.customCategories).forEach(c=>{if(!allCats().some(x=>x.name===c.name))S.customCategories.push(c);});toast(`Merged ${nw2.length} new`);svAll();render();return;}
      svAll();toast(`Imported ${imp.transactions.length}`);render();}catch(err){toast('Read failed','err');}};r.readAsText(f);}

    // Clear
    window.cCl=()=>{const d=document.createElement('div');d.innerHTML=`<div class="mo" onclick="if(event.target===this)this.parentElement.remove()"><div class="mb"><h3>🗑 Delete All Data?</h3><p>This will permanently remove all ${S.transactions.length} transactions and custom categories.</p><div class="ma"><button class="sbb s" onclick="this.closest('.mo').parentElement.remove()">Cancel</button><button class="sbb d" onclick="clAll()">Delete Everything</button></div></div></div>`;document.body.appendChild(d);};
    window.clAll=()=>{S.transactions=[];S.customCategories=[];sv({transactions:[],customCategories:[]});document.querySelector('.mo')?.parentElement?.remove();toast('All data deleted');render();};

    // ── App Preferences ──
    const AP_KEY='cashflow_prefs';
    function ldAP(){try{const r=localStorage.getItem(AP_KEY);if(r)return JSON.parse(r);}catch(e){}return{theme:'dark',pin:null};}
    function svAP(){localStorage.setItem(AP_KEY,JSON.stringify(AP));}
    let AP=ldAP();

    // Apply theme on boot
    function applyTheme(){
      document.body.classList.toggle('light',AP.theme==='light');
    }
    applyTheme();

    window.toggleTheme=checked=>{
      AP.theme=checked?'light':'dark';
      svAP(); applyTheme();
      // Re-render settings to update label
      renderSet();
    };

    // ── PIN Lock Screen ──
    function showPINLock(onSuccess){
      let entered='';
      const screen=document.createElement('div');
      screen.className='pin-screen'; screen.id='pin-lock';

      const draw=()=>{
        screen.innerHTML=`
          <div class="pin-logo"><span class="c">Cash</span><span class="f">Flow</span></div>
          <div class="pin-title">Enter your PIN</div>
          <div class="pin-dots">
            ${[0,1,2,3].map(i=>`<div class="pin-dot ${entered.length>i?'filled':''}" id="pd${i}"></div>`).join('')}
          </div>
          <div class="pin-err" id="perr"></div>
          <div class="pin-grid">
            ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`
              <button class="pin-key ${k===''?'empty':k==='⌫'?'del':''}" ${k===''?'disabled':''} onclick="pinKey('${k}')">${k}</button>`).join('')}
          </div>`;
      };

      window.pinKey=k=>{
        if(k==='⌫'){entered=entered.slice(0,-1);draw();return;}
        if(entered.length>=4) return;
        entered+=k;
        draw();
        if(entered.length===4){
          setTimeout(()=>{
            if(entered===AP.pin){
              screen.remove();
              delete window.pinKey;
              onSuccess();
            } else {
              entered='';
              document.getElementById('perr').textContent='Incorrect PIN. Try again.';
              document.querySelectorAll('.pin-dot').forEach(d=>{d.classList.add('error');setTimeout(()=>d.classList.remove('error'),500);});
              draw();
              document.getElementById('perr').textContent='Incorrect PIN. Try again.';
            }
          },120);
        }
      };

      draw();
      document.body.appendChild(screen);
    }

    // ── PIN Setup (inline in settings) ──
    let pinSetupBuf='', pinSetupStep=1, pinSetupFirst='';

    window.startSetPIN=()=>{ pinSetupBuf=''; pinSetupStep=1; pinSetupFirst=''; renderPINSetup(); };
    window.startChangePIN=()=>{ pinSetupBuf=''; pinSetupStep=1; pinSetupFirst=''; renderPINSetup(); };

    function renderPINSetup(){
      const area=document.getElementById('pin-inline'); if(!area) return;
      area.innerHTML=`
        <div style="padding-top:12px">
          <div class="pin-step">${pinSetupStep===1?'Enter new PIN':'Confirm your PIN'}</div>
          <div class="pin-setup-dots">
            ${[0,1,2,3].map(i=>`<div class="pin-setup-dot ${pinSetupBuf.length>i?'filled':''}"></div>`).join('')}
          </div>
          <div class="pin-mini-grid">
            ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`
              <button class="pin-mini-key ${k===''?'empty':k==='⌫'?'del':''}" ${k===''?'disabled':''} onclick="pinSetupKey('${k}')">${k}</button>`).join('')}
          </div>
        </div>`;
    }

    window.pinSetupKey=k=>{
      if(k==='⌫'){pinSetupBuf=pinSetupBuf.slice(0,-1);renderPINSetup();return;}
      if(pinSetupBuf.length>=4) return;
      pinSetupBuf+=k;
      renderPINSetup();
      if(pinSetupBuf.length===4){
        setTimeout(()=>{
          if(pinSetupStep===1){
            pinSetupFirst=pinSetupBuf; pinSetupBuf=''; pinSetupStep=2; renderPINSetup();
          } else {
            if(pinSetupBuf===pinSetupFirst){
              AP.pin=pinSetupBuf; svAP();
              pinSetupBuf=''; pinSetupStep=1; pinSetupFirst='';
              toast('PIN set successfully ✓');
              renderSet();
            } else {
              pinSetupBuf=''; pinSetupStep=1; pinSetupFirst='';
              toast('PINs did not match. Try again.','err');
              renderPINSetup();
            }
          }
        },120);
      }
    };

    window.removePin=()=>{
      // Ask current PIN first
      showPINLock(()=>{
        AP.pin=null; svAP();
        toast('PIN removed');
        renderSet();
      });
    };

    render();

    // ── Data safety banner (shown once ever) ──
    const SAFE_KEY = 'cashflow_safe_seen';
    function showSafeBanner() {
      if (localStorage.getItem(SAFE_KEY)) return;
      const b = document.createElement('div');
      b.className = 'dsafe-banner';
      b.innerHTML = `
        <div class="dsafe-inner">
          <div class="dsafe-top">
            <div class="dsafe-icon">🔒</div>
            <div class="dsafe-text">
              <strong>Your data lives in this browser</strong>
              <p>CashFlow stores everything locally on your device. <b>Clearing your browser cache, site data, or browser history can permanently delete all your transactions.</b> To keep your data safe, back it up regularly using Export JSON in Settings.</p>
            </div>
          </div>
          <div class="dsafe-actions">
            <button class="dsafe-export" onclick="exJ();dismissSafe()">📦 Export backup now</button>
            <button class="dsafe-ok" onclick="dismissSafe()">Got it, understood</button>
          </div>
        </div>`;
      document.body.appendChild(b);
    }
    window.dismissSafe = () => {
      localStorage.setItem(SAFE_KEY, '1');
      const b = document.querySelector('.dsafe-banner');
      if (b) { b.style.transition = 'opacity 0.3s, transform 0.3s'; b.style.opacity = '0'; b.style.transform = 'translateY(-100%)'; setTimeout(() => b.remove(), 320); }
    };
    // Small delay so the app renders first
    setTimeout(showSafeBanner, 800);

    // Check PIN on boot
    if(AP.pin){
      showPINLock(()=>{ /* unlocked, app already rendered */ });
    }

    // PWA
    let dp=null;
    window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;sIB();});
    function sIB(){if(document.querySelector('.inb'))return;const b=document.createElement('div');b.className='inb';b.innerHTML=`<p>Install <strong>CashFlow</strong></p><button class="inb-i" onclick="iPWA()">Install</button><button class="inb-d" onclick="this.parentElement.remove()">✕</button>`;document.body.appendChild(b);}
    window.iPWA=async()=>{if(!dp)return;dp.prompt();await dp.userChoice;dp=null;document.querySelector('.inb')?.remove();};
    if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  </script>
</body>
</html>
